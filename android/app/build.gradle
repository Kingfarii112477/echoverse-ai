apply plugin: 'com.android.application'

android {
    namespace 'ai.echoverse.app'
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "ai.echoverse.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Key injected via CI environment variables or gradle.properties
            // DO NOT hardcode credentials here
            def keystorePath = System.getenv("KEYSTORE_PATH") ?:
                (project.hasProperty('android.injected.signing.store.file') ?
                    project.property('android.injected.signing.store.file') : null)

            if (keystorePath != null && file(keystorePath).exists()) {
                storeFile file(keystorePath)
                storePassword System.getenv("STORE_PASSWORD") ?:
                    project.findProperty('android.injected.signing.store.password') ?: ''
                keyAlias System.getenv("KEY_ALIAS") ?:
                    project.findProperty('android.injected.signing.key.alias') ?: ''
                keyPassword System.getenv("KEY_PASSWORD") ?:
                    project.findProperty('android.injected.signing.key.password') ?: ''
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    bundle {
        language {
            enableSplit = false
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'src/main/libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
}

apply from: 'capacitor.build.gradle'
